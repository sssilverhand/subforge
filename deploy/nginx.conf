# SubForge nginx configuration
# Place in /etc/nginx/sites-available/subforge and symlink to sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name sub.ihne.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sub.ihne.online;

    ssl_certificate     /etc/letsencrypt/live/sub.ihne.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.ihne.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # ── SubForge admin + sub links ─────────────────────────────────────────
    # Everything not matched below goes to SubForge
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── VLESS XHTTP (stealth) ──────────────────────────────────────────────
    # Change /your-xhttp-path to whatever you configured in xray inbound settings
    location /your-xhttp-path {
        proxy_pass http://127.0.0.1:8443;  # xray XHTTP inbound port
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host       $host;
        proxy_buffering             off;
        proxy_request_buffering     off;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── Rate limiting for sub endpoint ────────────────────────────────────
    # Uncomment after adding: limit_req_zone $binary_remote_addr zone=sub:10m rate=10r/m;
    # in nginx.conf http block
    # location /sub/ {
    #     limit_req zone=sub burst=5 nodelay;
    #     proxy_pass http://127.0.0.1:8080;
    # }
}
